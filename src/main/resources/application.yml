spring:
  application:
    name: customer-address-api

  datasource:
    url: ${DATABASE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DATABASE_USERNAME:sa}
    password: ${DATABASE_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:create-drop}
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: false

server:
  port: ${PORT:8080}

cep:
  api:
    base-url: ${CEP_API_BASE_URL:https://viacep.com.br/ws}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.filipi.customeraddress: DEBUG
    org.springframework.web: INFO
