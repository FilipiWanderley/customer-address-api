spring:
  application:
    name: customer-address-api

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/customer_address_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

cep:
  api:
    base-url: ${CEP_API_BASE_URL:https://viacep.com.br/ws}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

logging:
  level:
    com.filipi.customeraddress: DEBUG
    org.springframework.web: INFO
